<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Casa" />
  <meta name="theme-color" content="#0c0c18" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Casa</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0c0c18;
      --surface: #13132a;
      --border:  #252545;
      --accent:  #a78bfa;
      --green:   #34d399;
      --yellow:  #fbbf24;
      --red:     #f87171;
      --muted:   #94a3b8;
      --dim:     #3f3f6a;
      --text:    #e2e8f0;
      --naty:    #818cf8;
      --marlene: #f472b6;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter','Segoe UI',system-ui,sans-serif; font-size: 16px; -webkit-font-smoothing: antialiased; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    .header { padding: 20px 20px 0; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .header h1 { font-size: 22px; font-weight: 800; line-height: 1; }
    .eyebrow { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
    .user-badge { font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; border: 1.5px solid; cursor: pointer; transition: opacity .15s; background: none; font-family: inherit; }
    .user-badge:active { opacity: .7; }
    .user-naty    { color: var(--naty);    border-color: var(--naty); }
    .user-marlene { color: var(--marlene); border-color: var(--marlene); }

    .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; margin-top: 16px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: 14px; font-weight: 400; padding: 10px 14px; cursor: pointer; white-space: nowrap; transition: all .15s; font-family: inherit; position: relative; }
    .tab.active { color: var(--text); font-weight: 600; border-bottom-color: var(--accent); }
    .tab-dot { position: absolute; top: 8px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); }

    .content { flex: 1; padding: 20px; overflow-y: auto; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
    .card-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; transition: border-color .15s; -webkit-appearance: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    select option { background: #1a1a3a; }
    .input-money { font-size: 24px; font-weight: 700; }

    .tipo-toggle { display: flex; gap: 8px; }
    .tipo-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit; }
    .tipo-btn.active-saida   { border-color: var(--red);    color: var(--red);    background: #1a0a0a; }
    .tipo-btn.active-reserva { border-color: var(--yellow); color: var(--yellow); background: #1a1500; }

    .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: #0f0f2a; font-weight: 700; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; transition: opacity .15s; font-family: inherit; margin-top: 4px; }
    .btn-primary:active { opacity: .8; }

    .mes-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .mes-nav-center { display: flex; align-items: center; gap: 8px; }
    .mes-nav span { font-size: 15px; font-weight: 600; }
    .mes-nav button { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; width: 36px; height: 36px; font-size: 16px; cursor: pointer; font-family: inherit; transition: border-color .15s; }
    .mes-nav button:hover { border-color: var(--accent); color: var(--text); }
    .mes-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .resumo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .resumo-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .rc-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    .rc-value { font-size: 18px; font-weight: 700; }

    .saldo-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; margin-bottom: 14px; }
    .saldo-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .saldo-valor { font-size: 32px; font-weight: 800; line-height: 1; }
    .saldo-detalhe { font-size: 13px; color: var(--muted); margin-top: 6px; }

    .quitar-btn { width: 100%; padding: 13px; border-radius: 10px; border: 1.5px solid var(--green); background: transparent; color: var(--green); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; margin-top: 4px; }
    .quitar-btn:hover { background: #0a1a14; }
    .quitar-btn:active { opacity: .8; }

    .quitado-badge { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 13px; border-radius: 10px; background: #0a1a14; border: 1.5px solid var(--green); margin-top: 4px; }
    .quitado-badge span:first-child { font-size: 18px; }
    .quitado-badge .qb-text { font-size: 13px; color: var(--green); font-weight: 600; }
    .quitado-badge .qb-sub  { font-size: 11px; color: var(--dim); }

    .reserva-box { background: #1a1500; border: 1px solid #3d3000; border-radius: 12px; padding: 14px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
    .rb-label { font-size: 12px; color: var(--yellow); margin-bottom: 4px; }
    .rb-val   { font-size: 20px; font-weight: 700; color: var(--yellow); }

    .filter-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 14px; padding-bottom: 4px; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip { white-space: nowrap; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s; }
    .filter-chip.active { border-color: var(--accent); color: var(--text); background: #1e1e3a; }

    .lancamento-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px; }
    .lancamento-item:last-child { border-bottom: none; }
    .lanc-left { flex: 1; min-width: 0; }
    .lanc-cat { font-size: 13px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lanc-meta { font-size: 11px; color: var(--muted); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .lanc-quem { font-weight: 600; font-size: 11px; }
    .lanc-right { text-align: right; flex-shrink: 0; }
    .lanc-valor { font-size: 15px; font-weight: 700; }
    .lanc-del { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; align-self: center; }
    .lanc-del:hover { color: var(--red); }
    .reserva-tag { font-size: 10px; background: #3d3000; color: var(--yellow); padding: 2px 6px; border-radius: 4px; }

    .cat-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .cat-bar-label { font-size: 12px; width: 120px; flex-shrink: 0; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cat-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .cat-bar-fill  { height: 100%; border-radius: 3px; background: var(--accent); transition: width .4s; }
    .cat-bar-val   { font-size: 12px; font-weight: 600; width: 76px; text-align: right; flex-shrink: 0; }

    .empty-state { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }
    .empty-state p:first-child { font-size: 32px; margin-bottom: 10px; }

    .dash-period { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; }
    .dash-period::-webkit-scrollbar { display: none; }
    .period-chip { white-space: nowrap; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s; }
    .period-chip.active { border-color: var(--accent); color: var(--text); background: #1e1e3a; }
    .chart-wrap      { position: relative; height: 200px; margin-bottom: 6px; }
    .chart-wrap-tall { position: relative; height: 260px; margin-bottom: 6px; }

    .modal-overlay { position: fixed; inset: 0; background: #00000099; display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 340px; text-align: center; }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal p  { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .modal-btns { display: flex; flex-direction: column; gap: 10px; }
    .modal-user-btn { padding: 14px; border-radius: 10px; border: 1.5px solid; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .modal-user-btn:active { opacity: .8; }

    .confirm-overlay { position: fixed; inset: 0; background: #00000099; display: flex; align-items: flex-end; justify-content: center; z-index: 60; padding: 20px; }
    .confirm-sheet { background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 12px 12px; padding: 24px; width: 100%; max-width: 480px; }
    .confirm-sheet h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .confirm-sheet p  { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-btns button { flex: 1; padding: 13px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .confirm-cancel { background: none; border: 1px solid var(--border); color: var(--muted); }
    .confirm-ok     { background: var(--green); border: none; color: #042f2e; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--green); color: #042f2e; font-weight: 700; font-size: 14px; border-radius: 8px; padding: 10px 22px; z-index: 99; white-space: nowrap; box-shadow: 0 4px 20px #00000066; pointer-events: none; transition: opacity .3s; }
    .toast.hide { opacity: 0; }
  </style>
</head>
<body>
<div id="app">
  <!-- modal usuário -->
  <div class="modal-overlay" id="modalUsuario" style="display:none">
    <div class="modal">
      <h2>Quem é você?</h2>
      <p>Escolha uma vez — fica salvo no seu celular.</p>
      <div class="modal-btns">
        <button class="modal-user-btn" style="color:var(--naty);border-color:var(--naty);background:#0f0f2a" onclick="definirUsuario('Naty')">Naty</button>
        <button class="modal-user-btn" style="color:var(--marlene);border-color:var(--marlene);background:#1a0a18" onclick="definirUsuario('Marlene')">Marlene</button>
      </div>
    </div>
  </div>

  <!-- confirm quitar -->
  <div class="confirm-overlay" id="confirmQuitar" style="display:none">
    <div class="confirm-sheet">
      <h3>Confirmar quitação</h3>
      <p id="confirmText"></p>
      <div class="confirm-btns">
        <button class="confirm-cancel" onclick="fecharConfirm()">Cancelar</button>
        <button class="confirm-ok"    onclick="confirmarQuitar()">Confirmar ✓</button>
      </div>
    </div>
  </div>

  <!-- modal lançar reserva -->
  <div class="confirm-overlay" id="modalReserva" style="display:none">
    <div class="confirm-sheet">
      <h3>🏦 Lançar reserva do mês</h3>
      <p id="reservaModalDesc" style="margin-bottom:16px"></p>
      <div style="margin-bottom:14px">
        <label style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px">Valor (R$)</label>
        <input type="number" id="reservaValorInput" step="0.01" min="0" inputmode="decimal"
          style="font-size:22px;font-weight:700;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);outline:none;font-family:inherit" />
      </div>
      <div style="margin-bottom:20px">
        <label style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px">Data</label>
        <input type="date" id="reservaDataInput"
          style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);outline:none;font-family:inherit;font-size:15px;-webkit-appearance:none" />
      </div>
      <div class="confirm-btns">
        <button class="confirm-cancel" onclick="fecharModalReserva()">Cancelar</button>
        <button class="confirm-ok" style="background:var(--yellow);color:#0f0a00" onclick="confirmarLancarReserva()">Salvar ✓</button>
      </div>
    </div>
  </div>

  <div class="header">
    <div class="header-top">
      <div>
        <p class="eyebrow">despesas da casa</p>
        <h1>Casa 🏠</h1>
      </div>
      <button class="user-badge" id="userBadge" onclick="trocarUsuario()"></button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active"  onclick="irPara('lancar')">Lançar</button>
    <button class="tab"         onclick="irPara('extrato')" id="tabExtrato">Extrato</button>
    <button class="tab"         onclick="irPara('resumo')" id="tabResumo">Resumo</button>
    <button class="tab"         onclick="irPara('dashboard')">Dashboard</button>
  </div>

  <div class="content" id="content"></div>
</div>
<div class="toast" id="toast" style="display:none"></div>

<script>
// ── config ────────────────────────────────────────────────
const SHEET_URL = "";

const CATEGORIAS = [
  "Alimentação","Restaurante/delivery","Luz","Água","Gás",
  "Internet","Telefone","Condomínio","Remédio","Médico",
  "Transporte","Combustível","Higiene/beleza","Streaming",
  "Lazer","Casa/Utensílios","Gasto da reserva","Outro"
];
// "Reserva da casa" vira categoria interna gerada automaticamente, não aparece na lista manual
const CAT_RESERVA    = "Reserva da casa";   // entra no 50/50, separada
const CAT_FORA_ACERTO = ["Gasto da reserva"]; // fora do 50/50
const PERC_RESERVA   = 0.10;

const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
               "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

const CORES_CAT = [
  "#818cf8","#f472b6","#34d399","#fbbf24","#f87171",
  "#38bdf8","#a3e635","#fb923c","#e879f9","#2dd4bf",
  "#facc15","#60a5fa","#4ade80","#f43f5e","#c084fc",
  "#67e8f9","#86efac","#fca5a5","#d8b4fe"
];

// ── state ─────────────────────────────────────────────────
let usuario     = localStorage.getItem("casa-usuario") || null;
let tabAtual    = "lancar";
let lancamentos = JSON.parse(localStorage.getItem("casa-lancamentos") || "[]");
let acertos     = JSON.parse(localStorage.getItem("casa-acertos") || "{}"); // chave "YYYY-MM": {quitadoPor, quando}
let extratoMes  = new Date().getMonth();
let extratoAno  = new Date().getFullYear();
let filtroQuem  = "todos";
let resumoMes   = new Date().getMonth();
let resumoAno   = new Date().getFullYear();
let dashPeriodo = 6;
let chartInstances = {};
let pendingQuitarChave = null;

// ── init ──────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  if (!usuario) { document.getElementById("modalUsuario").style.display = "flex"; }
  else { atualizarBadge(); atualizarTabDots(); renderTab(); }
});

function definirUsuario(u) {
  usuario = u;
  localStorage.setItem("casa-usuario", u);
  document.getElementById("modalUsuario").style.display = "none";
  atualizarBadge(); atualizarTabDots(); renderTab();
}
function trocarUsuario() { document.getElementById("modalUsuario").style.display = "flex"; }
function atualizarBadge() {
  const b = document.getElementById("userBadge");
  b.textContent = usuario;
  b.className = "user-badge user-" + usuario.toLowerCase();
}

// ── dots de pendência nas abas ────────────────────────────
function atualizarTabDots() {
  // verifica se há meses com acerto pendente
  const mesesComDivida = getMesesComDividaPendente();
  const tabR = document.getElementById("tabResumo");
  const tabE = document.getElementById("tabExtrato");
  if (!tabR || !tabE) return;

  // limpa dots existentes
  tabR.querySelectorAll(".tab-dot").forEach(d=>d.remove());
  tabE.querySelectorAll(".tab-dot").forEach(d=>d.remove());

  if (mesesComDivida.length > 0) {
    const dot1 = document.createElement("span"); dot1.className = "tab-dot"; tabR.appendChild(dot1);
    const dot2 = document.createElement("span"); dot2.className = "tab-dot"; tabE.appendChild(dot2);
  }
}

function getMesesComDividaPendente() {
  const mesesSet = new Set(lancamentos.map(l=>l.data.slice(0,7)));
  const pendentes = [];
  mesesSet.forEach(chave => {
    if (acertos[chave]) return;
    const [ano, mes] = chave.split("-").map(Number);
    const doMes = lancamentosDoPeriodo(mes-1, ano);
    const saidas = doMes.filter(l=>l.tipo==="saida");
    const noAcerto = saidas.filter(l=>!l.foraAcerto);
    const total = noAcerto.reduce((s,l)=>s+l.valor,0);
    const metade = total/2;
    const pNaty = noAcerto.filter(l=>l.quem==="Naty").reduce((s,l)=>s+l.valor,0);
    if (total > 0 && Math.abs(pNaty - metade) >= 0.01) pendentes.push(chave);
  });
  return pendentes;
}

// ── nav ───────────────────────────────────────────────────
function irPara(tab) {
  tabAtual = tab;
  destroyCharts();
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", ["lancar","extrato","resumo","dashboard"][i] === tab);
  });
  renderTab();
}
function renderTab() {
  const c = document.getElementById("content");
  if (tabAtual === "lancar")    c.innerHTML = htmlLancar();
  if (tabAtual === "extrato")   c.innerHTML = htmlExtrato();
  if (tabAtual === "resumo")    c.innerHTML = htmlResumo();
  if (tabAtual === "dashboard") { c.innerHTML = htmlDashboard(); buildCharts(); }
  atualizarTabDots();
}

// ── ABA LANÇAR ────────────────────────────────────────────
function htmlLancar() {
  const hoje = new Date().toISOString().slice(0,10);
  const opts = CATEGORIAS.map(c => `<option>${c}</option>`).join("");
  return `
    <div class="card">
      <div class="field">
        <label>Tipo</label>
        <div class="tipo-toggle">
          <button class="tipo-btn active-saida"  id="btnSaida"   onclick="setTipo('saida')">↓ Saída</button>
          <button class="tipo-btn"               id="btnReserva" onclick="setTipo('reserva')">🏦 Gasto da reserva</button>
        </div>
        <input type="hidden" id="tipoVal" value="saida" />
      </div>
      <div class="field">
        <label>Valor (R$)</label>
        <input class="input-money" type="number" id="valor" placeholder="0,00" min="0" step="0.01" inputmode="decimal" />
      </div>
      <div class="field" id="campoCategoria">
        <label>Categoria</label>
        <select id="categoria">${opts}</select>
      </div>
      <div class="field">
        <label>Data</label>
        <input type="date" id="data" value="${hoje}" />
      </div>
      <div class="field">
        <label>Descrição (opcional)</label>
        <input type="text" id="descricao" placeholder="ex: conta de março" />
      </div>
    </div>
    <div id="reservaHint" style="display:none;background:#1a1500;border:1px solid #3d3000;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--yellow);line-height:1.5">
      🏦 Este lançamento sairá da reserva acumulada. Não entra no acerto 50/50 do mês.
    </div>
    <button class="btn-primary" onclick="lancar()">Salvar lançamento</button>`;
}

function setTipo(tipo) {
  document.getElementById("tipoVal").value = tipo;
  document.getElementById("btnSaida").className   = "tipo-btn" + (tipo==="saida"   ? " active-saida"   : "");
  document.getElementById("btnReserva").className = "tipo-btn" + (tipo==="reserva" ? " active-reserva" : "");
  const hint = document.getElementById("reservaHint");
  const catField = document.getElementById("campoCategoria");
  if (tipo === "reserva") {
    hint.style.display = "block";
    catField.style.display = "none";
  } else {
    hint.style.display = "none";
    catField.style.display = "block";
    if (document.getElementById("categoria").value === "Gasto da reserva")
      document.getElementById("categoria").value = "Alimentação";
  }
}

async function lancar() {
  const valor      = parseFloat(document.getElementById("valor").value);
  const data       = document.getElementById("data").value;
  const descricao  = document.getElementById("descricao").value.trim();
  const tipoRaw    = document.getElementById("tipoVal").value;
  const tipo       = "saida";
  const isReservaGasto = tipoRaw === "reserva";
  const categoria  = isReservaGasto ? "Gasto da reserva" : document.getElementById("categoria").value;
  const foraAcerto = isReservaGasto || CAT_FORA_ACERTO.includes(categoria);

  if (!valor || valor <= 0 || !data) { toast("Preenche valor e data ✗", "var(--red)"); return; }

  const item = { id: Date.now(), tipo, categoria, valor, data, descricao, quem: usuario, foraAcerto };
  lancamentos.push(item);
  salvarLocal();

  if (SHEET_URL) {
    try { await fetch(SHEET_URL, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify(item) }); }
    catch(e) {}
  }
  toast("Lançamento salvo ✓");
  document.getElementById("valor").value = "";
  document.getElementById("descricao").value = "";
  document.getElementById("data").value = new Date().toISOString().slice(0,10);
  atualizarTabDots();
}

// ── ABA EXTRATO ───────────────────────────────────────────
function htmlExtrato() {
  const chave = chaveDoMes(extratoMes, extratoAno);
  const quitado = acertos[chave];
  const pendente = getMesesComDividaPendente().includes(chave);

  const statusDot = quitado
    ? `<span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span>`
    : pendente
    ? `<span style="width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block"></span>`
    : "";

  const doMes  = lancamentosDoPeriodo(extratoMes, extratoAno);
  const filtrado = filtroQuem==="todos" ? doMes : doMes.filter(l=>l.quem===filtroQuem);
  const sorted = [...filtrado].sort((a,b)=>b.data.localeCompare(a.data));

  const chips = ["todos","Naty","Marlene"].map(q=>`
    <button class="filter-chip ${filtroQuem===q?'active':''}" onclick="setFiltroQuem('${q}')">
      ${q==="todos"?"Todos":q}
    </button>`).join("");

  const items = sorted.length===0
    ? `<div class="empty-state"><p>📭</p><p>Nenhum lançamento neste mês.</p></div>`
    : sorted.map(l=>`
      <div class="lancamento-item">
        <div class="lanc-left">
          <div class="lanc-cat">${l.categoria}${l.descricao?` · ${l.descricao}`:""} ${l.foraAcerto?'<span class="reserva-tag">reserva</span>':''}</div>
          <div class="lanc-meta">
            <span class="lanc-quem" style="color:${l.quem==='Naty'?'var(--naty)':'var(--marlene)'}">${l.quem}</span>
            <span>·</span><span>${formatarData(l.data)}</span>
          </div>
        </div>
        <div class="lanc-right">
          <div class="lanc-valor" style="color:var(--red)">- ${moeda(l.valor)}</div>
        </div>
        <button class="lanc-del" onclick="deletar(${l.id})">×</button>
      </div>`).join("");

  return `
    <div class="mes-nav">
      <button onclick="navMesExtrato(-1)">‹</button>
      <div class="mes-nav-center">
        ${statusDot}
        <span>${MESES[extratoMes]} ${extratoAno}</span>
      </div>
      <button onclick="navMesExtrato(1)">›</button>
    </div>
    <div class="filter-row">${chips}</div>
    <div class="card" style="padding:4px 18px">${items}</div>`;
}

function navMesExtrato(d) {
  extratoMes+=d;
  if(extratoMes<0){extratoMes=11;extratoAno--;}
  if(extratoMes>11){extratoMes=0;extratoAno++;}
  renderTab();
}
function setFiltroQuem(q) { filtroQuem=q; renderTab(); }
function deletar(id) { lancamentos=lancamentos.filter(l=>l.id!==id); salvarLocal(); toast("Removido","var(--yellow)"); renderTab(); }

// ── ABA RESUMO ────────────────────────────────────────────
function htmlResumo() {
  const chave   = chaveDoMes(resumoMes, resumoAno);
  const doMes   = lancamentosDoPeriodo(resumoMes, resumoAno);
  const saidas  = doMes.filter(l=>l.tipo==="saida");

  // três grupos:
  const despesas      = saidas.filter(l=>!l.foraAcerto && l.categoria !== CAT_RESERVA);
  const contribReserva= saidas.filter(l=>!l.foraAcerto && l.categoria === CAT_RESERVA);
  const gastosReserva = saidas.filter(l=>l.foraAcerto);

  const totalDespesas      = despesas.reduce((s,l)=>s+l.valor,0);
  const totalContribReserva= contribReserva.reduce((s,l)=>s+l.valor,0);
  const totalGastosReserva = gastosReserva.reduce((s,l)=>s+l.valor,0);

  // reserva sugerida = 10% das despesas
  const reservaSugerida = totalDespesas * PERC_RESERVA;
  const reservaPaga     = totalContribReserva > 0;

  // acerto = despesas + contribuição reserva
  const totalAcerto = totalDespesas + totalContribReserva;
  const metade      = totalAcerto / 2;

  const pagoNaty    = [...despesas,...contribReserva].filter(l=>l.quem==="Naty").reduce((s,l)=>s+l.valor,0);
  const pagoMarlene = [...despesas,...contribReserva].filter(l=>l.quem==="Marlene").reduce((s,l)=>s+l.valor,0);
  const diffNaty    = pagoNaty - metade;

  const quitado  = acertos[chave];
  const temDivida= totalAcerto > 0 && Math.abs(diffNaty) >= 0.01;

  let saldoTexto="", saldoCor="var(--green)", devedora="";
  if(totalAcerto===0){ saldoTexto="Nenhum gasto registrado ainda."; }
  else if(Math.abs(diffNaty)<0.01){ saldoTexto="Tá na mão — 50/50 certinho ✓"; }
  else if(diffNaty>0){ saldoTexto=`Marlene deve ${moeda(Math.abs(diffNaty))} pra Naty`; saldoCor="var(--marlene)"; devedora="Marlene"; }
  else { saldoTexto=`Naty deve ${moeda(Math.abs(diffNaty))} pra Marlene`; saldoCor="var(--naty)"; devedora="Naty"; }

  // botão quitação
  let quitarHtml = "";
  if (quitado) {
    const dt = new Date(quitado.quando).toLocaleDateString("pt-BR");
    quitarHtml = `
      <div class="quitado-badge">
        <span>✅</span>
        <div>
          <div class="qb-text">Mês quitado</div>
          <div class="qb-sub">por ${quitado.quitadoPor} em ${dt}</div>
        </div>
      </div>`;
  } else if (temDivida) {
    const ehDevedora = devedora === usuario;
    quitarHtml = `
      <button class="quitar-btn" onclick="abrirConfirmQuitar('${chave}','${saldoTexto.replace(/'/g,"\\'")}')">
        ${ehDevedora ? "✓ Confirmei que paguei" : "✓ Confirmei que recebi"}
      </button>`;
  }

  // barras por categoria (só despesas, sem reserva e sem gasto da reserva)
  const porCat={};
  despesas.forEach(l=>{porCat[l.categoria]=(porCat[l.categoria]||0)+l.valor;});
  const catOrdenado=Object.entries(porCat).sort((a,b)=>b[1]-a[1]);
  const maxCat=catOrdenado[0]?.[1]||1;
  const catBars=catOrdenado.map(([cat,val])=>`
    <div class="cat-bar-row">
      <span class="cat-bar-label">${cat}</span>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(val/maxCat*100).toFixed(0)}%"></div></div>
      <span class="cat-bar-val">${moeda(val)}</span>
    </div>`).join("");

  // bloco reserva sugerida
  const reservaStatus = reservaPaga
    ? `<span style="color:var(--green);font-size:12px;font-weight:600">✓ registrada: ${moeda(totalContribReserva)}</span>`
    : reservaSugerida > 0
    ? `<span style="color:var(--yellow);font-size:12px">sugerida — ainda não registrada</span>`
    : `<span style="color:var(--dim);font-size:12px">registre despesas para calcular</span>`;

  const btnReserva = !reservaPaga && reservaSugerida > 0
    ? `<button onclick="abrirModalReserva(${reservaSugerida}, '${chave}')"
        style="margin-top:12px;width:100%;padding:10px;border-radius:8px;border:1.5px solid var(--yellow);background:transparent;color:var(--yellow);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">
        🏦 Lançar reserva do mês
      </button>`
    : "";

  const gastosReservaBox = totalGastosReserva > 0 ? `
    <div class="reserva-box" style="margin-bottom:14px">
      <div><div class="rb-label">🏦 Gastos da reserva</div><div style="font-size:11px;color:var(--dim)">fora do acerto 50/50</div></div>
      <div class="rb-val">${moeda(totalGastosReserva)}</div>
    </div>` : "";

  const dotCor = quitado ? "var(--green)" : temDivida ? "var(--red)" : "";
  const dot = dotCor ? `<span style="width:8px;height:8px;border-radius:50%;background:${dotCor};display:inline-block"></span>` : "";

  return `
    <div class="mes-nav">
      <button onclick="navMesResumo(-1)">‹</button>
      <div class="mes-nav-center">${dot}<span>${MESES[resumoMes]} ${resumoAno}</span></div>
      <button onclick="navMesResumo(1)">›</button>
    </div>

    <!-- bloco despesas -->
    <div class="card" style="margin-bottom:10px">
      <div class="card-label">Despesas da casa</div>
      <div class="resumo-grid" style="margin-bottom:0">
        <div class="resumo-card"><div class="rc-label">Total</div><div class="rc-value" style="color:var(--red)">${moeda(totalDespesas)}</div></div>
        <div class="resumo-card"><div class="rc-label">Cada uma</div><div class="rc-value" style="color:var(--muted)">${moeda(totalDespesas/2)}</div></div>
      </div>
    </div>

    <!-- bloco reserva -->
    <div class="card" style="margin-bottom:10px;background:#14130a;border-color:#3d3000">
      <div class="card-label" style="color:var(--yellow)">🏦 Reserva do mês (10% das despesas)</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>${reservaStatus}</div>
        <div style="font-size:18px;font-weight:700;color:var(--yellow)">${moeda(reservaSugerida)}</div>
      </div>
      ${btnReserva}
    </div>

    <!-- acerto geral -->
    <div class="resumo-grid">
      <div class="resumo-card"><div class="rc-label" style="color:var(--naty)">Naty pagou</div><div class="rc-value" style="color:var(--naty)">${moeda(pagoNaty)}</div></div>
      <div class="resumo-card"><div class="rc-label" style="color:var(--marlene)">Marlene pagou</div><div class="rc-value" style="color:var(--marlene)">${moeda(pagoMarlene)}</div></div>
    </div>

    <div class="saldo-card">
      <div class="saldo-label">acerto do mês</div>
      <div class="saldo-valor" style="color:${quitado?'var(--green)':saldoCor}">
        ${quitado?"✓ Quitadas":Math.abs(diffNaty)<0.01?"✓ Quitadas":moeda(Math.abs(diffNaty))}
      </div>
      <div class="saldo-detalhe">${quitado?"Acerto confirmado":saldoTexto}</div>
      ${totalAcerto>0&&!quitado?`<div style="font-size:11px;color:var(--dim);margin-top:4px">despesas ${moeda(totalDespesas)} + reserva ${moeda(totalContribReserva)} = ${moeda(totalAcerto)} ÷ 2</div>`:""}
    </div>
    ${quitarHtml}
    ${gastosReservaBox}
    ${catOrdenado.length>0?`<div class="card" style="margin-top:4px"><div class="card-label">por categoria</div>${catBars}</div>`:""}`;
}

function navMesResumo(d){resumoMes+=d;if(resumoMes<0){resumoMes=11;resumoAno--;}if(resumoMes>11){resumoMes=0;resumoAno++;}renderTab();}

// ── quitação ──────────────────────────────────────────────
function abrirConfirmQuitar(chave, texto) {
  pendingQuitarChave = chave;
  document.getElementById("confirmText").textContent = texto + " — confirmar que o acerto foi feito?";
  document.getElementById("confirmQuitar").style.display = "flex";
}
function fecharConfirm() {
  document.getElementById("confirmQuitar").style.display = "none";
  pendingQuitarChave = null;
}
function confirmarQuitar() {
  if (!pendingQuitarChave) return;
  acertos[pendingQuitarChave] = { quitadoPor: usuario, quando: new Date().toISOString() };
  localStorage.setItem("casa-acertos", JSON.stringify(acertos));
  fecharConfirm();
  toast("Mês quitado ✓");
  renderTab();
}

// ── modal lançar reserva ──────────────────────────────────
let pendingReservaValor = 0;
let pendingReservaChave = null;

function abrirModalReserva(valor, chave) {
  pendingReservaValor = valor;
  pendingReservaChave = chave;
  const [ano, mes] = chave.split("-").map(Number);
  document.getElementById("reservaModalDesc").textContent =
    `10% das despesas de ${MESES[mes-1]} ${ano} = ${moeda(valor)}. Confirme ou ajuste o valor.`;
  document.getElementById("reservaValorInput").value = valor.toFixed(2);
  document.getElementById("reservaDataInput").value = new Date().toISOString().slice(0,10);
  document.getElementById("modalReserva").style.display = "flex";
}
function fecharModalReserva() {
  document.getElementById("modalReserva").style.display = "none";
  pendingReservaValor = 0;
  pendingReservaChave = null;
}
async function confirmarLancarReserva() {
  const valor = parseFloat(document.getElementById("reservaValorInput").value);
  const data  = document.getElementById("reservaDataInput").value;
  if (!valor || valor <= 0 || !data) { toast("Preenche valor e data ✗", "var(--red)"); return; }

  const item = {
    id: Date.now(), tipo: "saida", categoria: CAT_RESERVA,
    valor, data, descricao: "Reserva do mês", quem: usuario, foraAcerto: false
  };
  lancamentos.push(item);
  salvarLocal();
  if (SHEET_URL) {
    try { await fetch(SHEET_URL, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify(item) }); }
    catch(e) {}
  }
  fecharModalReserva();
  toast("Reserva lançada ✓");
  renderTab();
}

// ── ABA DASHBOARD ─────────────────────────────────────────
function htmlDashboard() {
  return `
    <div class="dash-period">
      ${[3,6,12].map(p=>`<button class="period-chip ${dashPeriodo===p?'active':''}" onclick="setPeriodo(${p})">${p} meses</button>`).join("")}
      <button class="period-chip ${dashPeriodo===0?'active':''}" onclick="setPeriodo(0)">Tudo</button>
    </div>
    <div class="card">
      <div class="card-label">Gasto total por mês</div>
      <div class="chart-wrap"><canvas id="chartMensal"></canvas></div>
    </div>
    <div class="card">
      <div class="card-label">Por categoria (período)</div>
      <div class="chart-wrap-tall"><canvas id="chartCat"></canvas></div>
    </div>
    <div class="card">
      <div class="card-label">Naty vs Marlene por mês</div>
      <div class="chart-wrap"><canvas id="chartPessoas"></canvas></div>
    </div>`;
}

function setPeriodo(p) { dashPeriodo=p; destroyCharts(); renderTab(); }

function getMesesPeriodo() {
  const mesesDisp=[], now=new Date();
  if(dashPeriodo===0) {
    const set=new Set(lancamentos.map(l=>l.data.slice(0,7)));
    [...set].sort().forEach(ym=>{ const [y,m]=ym.split("-"); mesesDisp.push({ano:+y,mes:+m-1}); });
    return mesesDisp.length?mesesDisp:[{ano:now.getFullYear(),mes:now.getMonth()}];
  }
  for(let i=dashPeriodo-1;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    mesesDisp.push({ano:d.getFullYear(),mes:d.getMonth()});
  }
  return mesesDisp;
}

function buildCharts() {
  const meses=getMesesPeriodo();
  const labels=meses.map(({mes,ano})=>`${MESES[mes].slice(0,3)}/${String(ano).slice(2)}`);
  const totaisMes   =meses.map(({mes,ano})=>lancamentosDoPeriodo(mes,ano).filter(l=>l.tipo==="saida").reduce((s,l)=>s+l.valor,0));
  const pagoNatyMes =meses.map(({mes,ano})=>lancamentosDoPeriodo(mes,ano).filter(l=>l.tipo==="saida"&&!l.foraAcerto&&l.quem==="Naty").reduce((s,l)=>s+l.valor,0));
  const pagoMarMes  =meses.map(({mes,ano})=>lancamentosDoPeriodo(mes,ano).filter(l=>l.tipo==="saida"&&!l.foraAcerto&&l.quem==="Marlene").reduce((s,l)=>s+l.valor,0));

  const porCat={};
  meses.forEach(({mes,ano})=>{ lancamentosDoPeriodo(mes,ano).filter(l=>l.tipo==="saida").forEach(l=>{ porCat[l.categoria]=(porCat[l.categoria]||0)+l.valor; }); });
  const catEntries=Object.entries(porCat).sort((a,b)=>b[1]-a[1]).slice(0,10);

  const baseOpts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>' '+moeda(ctx.raw)}} },
    scales:{
      x:{ ticks:{color:"#94a3b8",font:{size:11}}, grid:{color:"#252545"} },
      y:{ ticks:{color:"#94a3b8",font:{size:11},callback:v=>`R$${(v/1000).toFixed(0)}k`}, grid:{color:"#252545"} }
    }
  };

  chartInstances.mensal = new Chart(document.getElementById("chartMensal").getContext("2d"), {
    type:"bar",
    data:{ labels, datasets:[{ data:totaisMes, backgroundColor:"#a78bfa44", borderColor:"#a78bfa", borderWidth:2, borderRadius:6 }] },
    options:baseOpts
  });

  chartInstances.cat = new Chart(document.getElementById("chartCat").getContext("2d"), {
    type:"bar",
    data:{
      labels:catEntries.map(([c])=>c),
      datasets:[{ data:catEntries.map(([,v])=>v), backgroundColor:catEntries.map((_,i)=>CORES_CAT[i%CORES_CAT.length]+"99"), borderColor:catEntries.map((_,i)=>CORES_CAT[i%CORES_CAT.length]), borderWidth:1.5, borderRadius:4 }]
    },
    options:{
      indexAxis:"y", responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>' '+moeda(ctx.raw)}} },
      scales:{
        x:{ ticks:{color:"#94a3b8",font:{size:11},callback:v=>`R$${(v/1000).toFixed(1)}k`}, grid:{color:"#252545"} },
        y:{ ticks:{color:"#94a3b8",font:{size:11}}, grid:{display:false} }
      }
    }
  });

  chartInstances.pessoas = new Chart(document.getElementById("chartPessoas").getContext("2d"), {
    type:"bar",
    data:{
      labels,
      datasets:[
        { label:"Naty",    data:pagoNatyMes, backgroundColor:"#818cf844", borderColor:"#818cf8", borderWidth:2, borderRadius:6 },
        { label:"Marlene", data:pagoMarMes,  backgroundColor:"#f472b644", borderColor:"#f472b6", borderWidth:2, borderRadius:6 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:true,labels:{color:"#94a3b8",font:{size:12},boxWidth:12}}, tooltip:{callbacks:{label:ctx=>' '+moeda(ctx.raw)}} },
      scales:{
        x:{ ticks:{color:"#94a3b8",font:{size:11}}, grid:{color:"#252545"} },
        y:{ ticks:{color:"#94a3b8",font:{size:11},callback:v=>`R$${(v/1000).toFixed(0)}k`}, grid:{color:"#252545"} }
      }
    }
  });
}
function destroyCharts() { Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch(e){}}); chartInstances={}; }

// ── utils ─────────────────────────────────────────────────
function chaveDoMes(mes, ano) { return `${ano}-${String(mes+1).padStart(2,"0")}`; }
function lancamentosDoPeriodo(mes,ano) {
  return lancamentos.filter(l=>{ const d=new Date(l.data+"T12:00:00"); return d.getMonth()===mes&&d.getFullYear()===ano; });
}
function salvarLocal() { localStorage.setItem("casa-lancamentos",JSON.stringify(lancamentos)); }
function moeda(v) { return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }
function formatarData(iso) { const [y,m,d]=iso.split("-"); return `${d}/${m}`; }

let toastTimer;
function toast(msg,cor="var(--green)") {
  const t=document.getElementById("toast");
  t.textContent=msg; t.style.background=cor; t.style.color=cor==="var(--green)"?"#042f2e":"#0f0f1a";
  t.style.display="block"; t.classList.remove("hide");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ t.classList.add("hide"); setTimeout(()=>{t.style.display="none";t.classList.remove("hide");},350); },2000);
// ── service worker ────────────────────────────────────────
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
